<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Searcher — поисковик</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #0066cc;
    }

    header span.badge {
      font-size: 13px;
      color: #888;
      background: #f0f0f5;
      padding: 2px 8px;
      border-radius: 10px;
    }

    header .spacer { flex: 1; }

    header .user-box {
      font-size: 14px;
      color: #444;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .user-box button {
      background: none;
      border: 1px solid #d0d0d5;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 13px;
      color: #555;
    }

    header .user-box button:hover { background: #f0f0f5; }

    nav.tabs {
      max-width: 800px;
      margin: 20px auto 0;
      padding: 0 24px;
      display: flex;
      gap: 8px;
    }

    nav.tabs button {
      background: #fff;
      border: 1px solid #d0d0d5;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      color: #444;
    }

    nav.tabs button.active {
      background: #0066cc;
      border-color: #0066cc;
      color: #fff;
    }

    .page { display: none; }
    .page.active { display: block; }

    .search-section {
      max-width: 800px;
      margin: 20px auto 0;
      padding: 0 24px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      background: #fff;
      border: 1px solid #d0d0d5;
      border-radius: 12px;
      padding: 10px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      background: transparent;
    }

    .search-box button {
      background: #0066cc;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .search-box button:hover { background: #0055b0; }
    .search-box button:disabled { background: #aaa; cursor: default; }

    .options {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 12px;
      font-size: 14px;
      color: #555;
    }

    .options label { display: flex; align-items: center; gap: 6px; cursor: pointer; }

    .options select {
      border: 1px solid #d0d0d5;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 14px;
      background: #fff;
    }

    #status {
      max-width: 800px;
      margin: 12px auto 0;
      padding: 0 24px;
      font-size: 13px;
      color: #888;
      min-height: 18px;
    }

    .results, .list-section {
      max-width: 800px;
      margin: 16px auto 40px;
      padding: 0 24px;
    }

    .summary-box {
      background: #eef4ff;
      border: 1px solid #b8d4ff;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }

    .summary-box h3 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #0066cc;
      margin-bottom: 8px;
    }

    .summary-box p { font-size: 15px; line-height: 1.6; }

    .result-card, .row-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .result-card .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      gap: 10px;
    }

    .result-card h2 {
      font-size: 17px;
      font-weight: 600;
    }

    .result-card h2 a {
      color: #0066cc;
      text-decoration: none;
    }

    .result-card h2 a:hover { text-decoration: underline; }

    .result-card .score {
      font-size: 12px;
      color: #888;
      background: #f5f5f7;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .result-card .source {
      font-size: 12px;
      color: #22aa55;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .result-card p {
      font-size: 14px;
      line-height: 1.6;
      color: #333;
      margin-bottom: 10px;
    }

    .save-btn {
      font-size: 13px;
      border: 1px solid #0066cc;
      color: #0066cc;
      background: #fff;
      border-radius: 6px;
      padding: 4px 12px;
      cursor: pointer;
    }

    .save-btn:hover { background: #eef4ff; }
    .save-btn:disabled { border-color: #aaa; color: #aaa; cursor: default; }

    .empty {
      text-align: center;
      color: #888;
      padding: 60px 0;
      font-size: 16px;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #ccc;
      border-top-color: #0066cc;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- auth screen --- */
    .auth-screen {
      max-width: 380px;
      margin: 80px auto;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .auth-screen h2 {
      font-size: 20px;
      margin-bottom: 20px;
      color: #0066cc;
    }

    .auth-screen input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid #d0d0d5;
      border-radius: 8px;
      font-size: 15px;
    }

    .auth-screen button.primary {
      width: 100%;
      background: #0066cc;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 15px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .auth-screen button.link {
      width: 100%;
      background: none;
      border: none;
      color: #0066cc;
      font-size: 13px;
      cursor: pointer;
    }

    .auth-screen .error {
      color: #cc3333;
      font-size: 13px;
      margin-bottom: 10px;
      min-height: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #e5e5e5;
    }

    th, td {
      text-align: left;
      padding: 10px 14px;
      font-size: 13px;
      border-bottom: 1px solid #eee;
    }

    th { background: #f5f5f7; color: #555; }

    table select {
      font-size: 13px;
      padding: 3px 6px;
      border-radius: 6px;
      border: 1px solid #d0d0d5;
    }

    table button {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid #0066cc;
      background: #fff;
      color: #0066cc;
      cursor: pointer;
      margin-left: 6px;
    }

    h3.section-title {
      font-size: 15px;
      margin: 24px 0 10px;
      color: #333;
    }

    h3.section-title:first-child { margin-top: 0; }
  </style>
</head>
<body>

<div id="authScreen" class="auth-screen">
  <h2 id="authTitle">Вход</h2>
  <div class="error" id="authError"></div>
  <input type="text" id="authUsername" placeholder="Логин (мин. 3 символа)" autocomplete="username">
  <input type="password" id="authPassword" placeholder="Пароль (мин. 6 символов)" autocomplete="current-password">
  <button class="primary" id="authSubmit" onclick="submitAuth()">Войти</button>
  <button class="link" onclick="toggleAuthMode()" id="authToggle">Нет аккаунта? Зарегистрироваться</button>
</div>

<div id="app" style="display:none">
  <header>
    <h1>Searcher</h1>
    <span class="badge">MVP · Кейс №2</span>
    <div class="spacer"></div>
    <div class="user-box">
      <span id="userInfo"></span>
      <button onclick="logout()">Выйти</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-page="search" onclick="showPage('search')">Поиск</button>
    <button class="tab-btn" data-page="saved" onclick="showPage('saved')">Избранное</button>
    <button class="tab-btn" data-page="history" onclick="showPage('history')">История</button>
    <button class="tab-btn" data-page="admin" id="adminTabBtn" style="display:none" onclick="showPage('admin')">Админ</button>
  </nav>

  <div id="page-search" class="page active">
    <div class="search-section">
      <div class="search-box">
        <input type="text" id="query" placeholder="Введите запрос на английском: machine learning, docker, python..." autofocus>
        <button id="searchBtn" onclick="doSearch()">Найти</button>
      </div>
      <div class="options">
        <label>
          <input type="checkbox" id="withSummary">
          Суммаризация
        </label>
        <label>
          Результатов:
          <select id="topK">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="10">10</option>
          </select>
        </label>
        <label>
          Категория:
          <select id="categoryFilter">
            <option value="">Все категории</option>
          </select>
        </label>
      </div>
    </div>
    <div id="status"></div>
    <div class="results" id="results"></div>
  </div>

  <div id="page-saved" class="page">
    <div class="list-section" id="savedList"></div>
  </div>

  <div id="page-history" class="page">
    <div class="list-section" id="historyList"></div>
  </div>

  <div id="page-admin" class="page">
    <div class="list-section">
      <h3 class="section-title">Статистика</h3>
      <div id="adminStats"></div>
      <h3 class="section-title">Пользователи</h3>
      <div id="adminUsers"></div>
      <h3 class="section-title">Вся история поиска</h3>
      <div id="adminHistory"></div>
    </div>
  </div>
</div>

<script>
  let token = localStorage.getItem('token');
  let currentUser = null; // {id, username, role}
  let authMode = 'login'; // or 'register'

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function api(path, options = {}) {
    const headers = options.headers || {};
    if (token) headers['Authorization'] = `Bearer ${token}`;
    if (options.body) headers['Content-Type'] = 'application/json';
    const resp = await fetch(path, { ...options, headers });
    if (resp.status === 401) {
      logout();
      throw new Error('Сессия истекла, войдите заново');
    }
    if (!resp.ok) {
      const detail = await resp.json().catch(() => ({}));
      throw new Error(detail.detail || `HTTP ${resp.status}`);
    }
    return resp.status === 204 ? null : resp.json();
  }

  function toggleAuthMode() {
    authMode = authMode === 'login' ? 'register' : 'login';
    document.getElementById('authTitle').textContent = authMode === 'login' ? 'Вход' : 'Регистрация';
    document.getElementById('authSubmit').textContent = authMode === 'login' ? 'Войти' : 'Зарегистрироваться';
    document.getElementById('authToggle').textContent = authMode === 'login'
      ? 'Нет аккаунта? Зарегистрироваться'
      : 'Уже есть аккаунт? Войти';
    document.getElementById('authError').textContent = '';
  }

  async function submitAuth() {
    const username = document.getElementById('authUsername').value.trim();
    const password = document.getElementById('authPassword').value;
    const errEl = document.getElementById('authError');
    errEl.textContent = '';

    if (username.length < 3 || password.length < 6) {
      errEl.textContent = 'Логин от 3 символов, пароль от 6 символов';
      return;
    }

    try {
      const path = authMode === 'login' ? '/auth/login' : '/auth/register';
      const data = await api(path, { method: 'POST', body: JSON.stringify({ username, password }) });
      token = data.access_token;
      localStorage.setItem('token', token);
      await loadCurrentUser();
      enterApp();
    } catch (e) {
      errEl.textContent = e.message;
    }
  }

  function logout() {
    token = null;
    currentUser = null;
    localStorage.removeItem('token');
    document.getElementById('app').style.display = 'none';
    document.getElementById('authScreen').style.display = 'block';
  }

  async function loadCurrentUser() {
    currentUser = await api('/me');
  }

  function enterApp() {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('userInfo').textContent = `${currentUser.username} (${currentUser.role})`;
    document.getElementById('adminTabBtn').style.display = currentUser.role === 'owner' ? 'inline-block' : 'none';
    showPage('search');
    loadCategories();
  }

  async function loadCategories() {
    const select = document.getElementById('categoryFilter');
    try {
      const categories = await api('/categories');
      const options = categories
        .map(c => `<option value="${escHtml(c.category)}">${escHtml(c.category)} (${c.count})</option>`)
        .join('');
      select.innerHTML = `<option value="">Все категории</option>${options}`;
    } catch (e) {
      // Filter dropdown is a nice-to-have; leave it at "Все категории" on failure.
    }
  }

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${name}`).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.page === name));

    if (name === 'saved') loadSaved();
    if (name === 'history') loadHistory();
    if (name === 'admin' && currentUser.role === 'owner') loadAdmin();
  }

  const input = document.getElementById('query');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  async function doSearch() {
    const q = input.value.trim();
    if (!q) return;

    const btn = document.getElementById('searchBtn');
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    const topK = document.getElementById('topK').value;
    const withSummary = document.getElementById('withSummary').checked;
    const category = document.getElementById('categoryFilter').value;

    btn.disabled = true;
    btn.textContent = 'Ищу...';
    status.innerHTML = '<span class="spinner"></span>Загрузка...';
    results.innerHTML = '';

    try {
      const params = new URLSearchParams({ q, top_k: topK, with_summary: withSummary });
      if (category) params.set('category', category);
      const data = await api(`/search?${params}`);
      status.textContent = `Найдено ${data.total} документов`;
      renderResults(data);
    } catch (e) {
      status.textContent = `Ошибка: ${e.message}`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Найти';
    }
  }

  function renderResults(data) {
    const el = document.getElementById('results');
    const canSave = currentUser.role === 'writer' || currentUser.role === 'owner';

    if (data.total === 0) {
      el.innerHTML = '<div class="empty">Ничего не найдено. Попробуйте другой запрос.</div>';
      return;
    }

    let html = '';

    if (data.summary) {
      html += `
        <div class="summary-box">
          <h3>Суммаризация</h3>
          <p>${escHtml(data.summary)}</p>
        </div>`;
    }

    data.results.forEach((r, i) => {
      const tags = (r.categories || [])
        .map(c => `<span class="score">${escHtml(c)}</span>`)
        .join(' ');
      html += `
        <div class="result-card">
          <div class="meta">
            <h2><a href="${escHtml(r.url)}" target="_blank">${escHtml(r.title)}</a></h2>
            <span class="score">score: ${r.score}</span>
          </div>
          <div class="source">${escHtml(r.url)}</div>
          <p>${escHtml(r.snippet)}</p>
          ${tags ? `<div style="margin-bottom:10px">${tags}</div>` : ''}
          ${canSave ? `<button class="save-btn" id="save-${i}" onclick="saveArticle('${escHtml(r.url).replace(/'/g, "\\'")}', '${escHtml(r.title).replace(/'/g, "\\'")}', ${i})">Сохранить</button>` : ''}
        </div>`;
    });

    el.innerHTML = html;
  }

  async function saveArticle(url, title, i) {
    const btn = document.getElementById(`save-${i}`);
    try {
      await api('/saved', { method: 'POST', body: JSON.stringify({ article_url: url, article_title: title }) });
      btn.disabled = true;
      btn.textContent = 'Сохранено';
    } catch (e) {
      alert(`Не удалось сохранить: ${e.message}`);
    }
  }

  async function loadSaved() {
    const el = document.getElementById('savedList');
    el.innerHTML = '<div class="empty">Загрузка...</div>';
    try {
      const items = await api('/saved');
      if (items.length === 0) {
        el.innerHTML = '<div class="empty">Пока ничего не сохранено.</div>';
        return;
      }
      el.innerHTML = items.map(item => `
        <div class="row-card">
          <div class="meta">
            <h2><a href="${escHtml(item.article_url)}" target="_blank">${escHtml(item.article_title)}</a></h2>
            <button class="save-btn" onclick="deleteSaved(${item.id})">Удалить</button>
          </div>
          <div class="source">Сохранено: ${new Date(item.saved_at).toLocaleString()}</div>
        </div>
      `).join('');
    } catch (e) {
      el.innerHTML = `<div class="empty">Ошибка: ${escHtml(e.message)}</div>`;
    }
  }

  async function deleteSaved(id) {
    try {
      await api(`/saved/${id}`, { method: 'DELETE' });
      loadSaved();
    } catch (e) {
      alert(`Не удалось удалить: ${e.message}`);
    }
  }

  async function loadHistory() {
    const el = document.getElementById('historyList');
    el.innerHTML = '<div class="empty">Загрузка...</div>';
    try {
      const items = await api('/history/me');
      if (items.length === 0) {
        el.innerHTML = '<div class="empty">Вы ещё ничего не искали.</div>';
        return;
      }
      el.innerHTML = `
        <table>
          <tr><th>Запрос</th><th>Найдено</th><th>Когда</th></tr>
          ${items.map(h => `
            <tr>
              <td>${escHtml(h.query)}</td>
              <td>${h.results_count}</td>
              <td>${new Date(h.created_at).toLocaleString()}</td>
            </tr>
          `).join('')}
        </table>`;
    } catch (e) {
      el.innerHTML = `<div class="empty">Ошибка: ${escHtml(e.message)}</div>`;
    }
  }

  async function loadAdmin() {
    await Promise.all([loadAdminStats(), loadAdminUsers(), loadAdminHistory()]);
  }

  async function loadAdminStats() {
    const el = document.getElementById('adminStats');
    try {
      const data = await api('/admin/stats');
      el.innerHTML = `
        <table>
          <tr><th>Топ запросов</th><th>Количество</th></tr>
          ${data.top_queries.map(q => `<tr><td>${escHtml(q.query)}</td><td>${q.count}</td></tr>`).join('') || '<tr><td colspan="2">Нет данных</td></tr>'}
        </table>
        <table style="margin-top:10px">
          <tr><th>Активнее среднего</th><th>Поисков</th></tr>
          ${data.users_above_average.map(u => `<tr><td>${escHtml(u.username)}</td><td>${u.searches}</td></tr>`).join('') || '<tr><td colspan="2">Нет данных</td></tr>'}
        </table>`;
    } catch (e) {
      el.innerHTML = `<div class="empty">Ошибка: ${escHtml(e.message)}</div>`;
    }
  }

  async function loadAdminUsers() {
    const el = document.getElementById('adminUsers');
    try {
      const users = await api('/admin/users');
      el.innerHTML = `
        <table>
          <tr><th>Логин</th><th>Роль</th><th>Создан</th><th></th></tr>
          ${users.map(u => `
            <tr>
              <td>${escHtml(u.username)}</td>
              <td>
                <select id="role-${u.id}">
                  ${['reader','writer','owner'].map(r => `<option value="${r}" ${r === u.role ? 'selected' : ''}>${r}</option>`).join('')}
                </select>
              </td>
              <td>${new Date(u.created_at).toLocaleDateString()}</td>
              <td><button onclick="changeRole(${u.id})">Сохранить</button></td>
            </tr>
          `).join('')}
        </table>`;
    } catch (e) {
      el.innerHTML = `<div class="empty">Ошибка: ${escHtml(e.message)}</div>`;
    }
  }

  async function changeRole(userId) {
    const role = document.getElementById(`role-${userId}`).value;
    try {
      await api(`/admin/users/${userId}/role`, { method: 'PATCH', body: JSON.stringify({ role }) });
      loadAdminUsers();
    } catch (e) {
      alert(`Не удалось изменить роль: ${e.message}`);
    }
  }

  async function loadAdminHistory() {
    const el = document.getElementById('adminHistory');
    try {
      const items = await api('/admin/history');
      if (items.length === 0) {
        el.innerHTML = '<div class="empty">Пока нет запросов.</div>';
        return;
      }
      el.innerHTML = `
        <table>
          <tr><th>Пользователь</th><th>Роль</th><th>Запрос</th><th>Найдено</th><th>Когда</th></tr>
          ${items.map(h => `
            <tr>
              <td>${escHtml(h.username)}</td>
              <td>${escHtml(h.role)}</td>
              <td>${escHtml(h.query)}</td>
              <td>${h.results_count}</td>
              <td>${new Date(h.created_at).toLocaleString()}</td>
            </tr>
          `).join('')}
        </table>`;
    } catch (e) {
      el.innerHTML = `<div class="empty">Ошибка: ${escHtml(e.message)}</div>`;
    }
  }

  // Auto-login on page load if a token is already stored.
  (async () => {
    if (!token) return;
    try {
      await loadCurrentUser();
      enterApp();
    } catch (e) {
      logout();
    }
  })();
</script>
